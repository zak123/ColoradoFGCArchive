<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorado FGC Archive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .logo {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header .logo span {
      color: #ff6b35;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .page-desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
    }

    .album-count {
      color: #ff6b35;
      font-weight: 600;
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .album-card {
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 1px solid #222;
    }

    .album-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border-color: #333;
    }

    .album-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .album-info {
      padding: 14px 16px 16px;
    }

    .album-name {
      font-size: 15px;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .album-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .album-meta .count {
      background: #2a2a2a;
      border-radius: 4px;
      padding: 2px 7px;
      color: #999;
    }

    footer {
      text-align: center;
      padding: 40px 24px;
      color: #444;
      font-size: 12px;
      border-top: 1px solid #1a1a1a;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Colorado <span>FGC</span> Archive</div>
    <div class="subtitle">Fighting Game Community Photo Archive</div>
  </header>

  <main>
    <h1 class="page-title">Photo Albums</h1>
    <p class="page-desc" id="desc">Browse <span class="album-count" id="album-count"></span> events from the Colorado FGC scene.</p>
    <div class="albums-grid" id="albums-grid"></div>
  </main>

  <footer>Colorado FGC Archive &mdash; All photos are property of their respective photographers.</footer>

  <script src="data.js"></script>
  <script>
    function formatName(name) {
      // Split on underscores and camelCase transitions
      return name
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
        .trim();
    }

    const grid = document.getElementById('albums-grid');
    document.getElementById('album-count').textContent = ALBUMS.length;

    ALBUMS.forEach(album => {
      const label = formatName(album.name);
      const card = document.createElement('a');
      card.className = 'album-card';
      card.href = `album.html?album=${encodeURIComponent(album.name)}`;
      card.innerHTML = `
        <img class="album-thumb" src="img/${album.name}/${album.cover}" alt="${label}" loading="lazy">
        <div class="album-info">
          <div class="album-name">${label}</div>
          <div class="album-meta">
            <span class="count">${album.images.length} photos</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
